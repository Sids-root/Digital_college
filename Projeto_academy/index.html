<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            
                <img src="logo.png" alt="logo">
                <h1>Acesso ao EAD da Digital College</h1>
            </div>
            <div class="formulario">
                <p>Preencja os seus dados abaixo.</p>
                <form>
                    <label for="cpf"></label>
                    <input class="cpf" type="text" id="cpf" name="cpf" placeholder="CPF">

                    <label for="senha"></label>
                    <input class="senha" type="password" name="senha" id="senha" placeholder="Senha">

                </form>
                <div class="mbu">
                    <input type="checkbox" name="lembrar_acesso" id="lembrar_acesso">
                    <label for="lembrar_acesso">Lembrar acesso</label>
                    <a href="">Esqueceu a senha</a>
                </div>

                <button type="button">Acessar</button>
            </div>
        </div>
    </div>
</body>
</html>
